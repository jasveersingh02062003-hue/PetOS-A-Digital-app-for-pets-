<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Petos paw-leaf glyph: a paw print where the central pad is a leaf -->
  <!-- Three top toe-beans -->
  <ellipse cx="9" cy="9" rx="2.6" ry="3.4" fill="currentColor" opacity="0.95"/>
  <ellipse cx="16" cy="6.5" rx="2.7" ry="3.6" fill="currentColor" opacity="0.95"/>
  <ellipse cx="23" cy="9" rx="2.6" ry="3.4" fill="currentColor" opacity="0.95"/>
  <!-- Side bean -->
  <ellipse cx="6" cy="16" rx="2.2" ry="2.8" fill="currentColor" opacity="0.85"/>
  <ellipse cx="26" cy="16" rx="2.2" ry="2.8" fill="currentColor" opacity="0.85"/>
  <!-- Central pad styled as a leaf (the twist) -->
  <path d="M16 14c-4.5 0-7.5 3-7.5 6.5C8.5 24.5 12 27 16 27s7.5-2.5 7.5-6.5C23.5 17 20.5 14 16 14z" fill="currentColor"/>
  <!-- Leaf vein -->
  <path d="M16 16.5v9" stroke="hsl(var(--background))" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <path d="M16 19c1.4 0.6 2.4 1.6 2.8 2.8M16 19c-1.4 0.6-2.4 1.6-2.8 2.8" stroke="hsl(var(--background))" stroke-width="0.7" stroke-linecap="round" opacity="0.45" fill="none"/>
</svg>
